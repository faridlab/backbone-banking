# Codegen policy for banking.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/banking_events.rs"
  - "src/application/service/banking_gl.rs"
  - "src/application/service/banking_write_service.rs"
  # Own the hand-written banking SQL (the masters, the statement import's header+lines, the clearing
  # engine's line reads + settlement lock/SUM + clearance writes + allocation watermark, and the
  # reconciliation close-gate's exception count) that the write service orchestrates. Declared here —
  # not renamed with a `_custom` suffix — so the generator skips them wholesale; this declaration is
  # what makes editing them legitimate.
  - "src/infrastructure/persistence/bank_repository.rs"
  - "src/infrastructure/persistence/bank_account_repository.rs"
  - "src/infrastructure/persistence/bank_clearance_repository.rs"
  - "src/infrastructure/persistence/bank_reconciliation_repository.rs"
  - "src/infrastructure/persistence/bank_statement_import_repository.rs"
  - "src/infrastructure/persistence/bank_transaction_repository.rs"
  - "src/presentation/http/guarded_routes.rs"
  - "tests/banking_golden_cases.rs"
  - "tests/integrity_probes.rs"
  - "tests/clearing_seam.rs"
  - "scripts/**"
  # Hand-authored behavior (services + their HTTP surface). Examples:
  # - "src/application/service/onboarding_service.rs"
  # - "src/presentation/http/guarded_routes.rs"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"
  # - "tests/*_golden_cases.rs"
  # - "tests/integrity_probes.rs"

  # Hand-authored module documentation.
  - "docs/**"
