server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/banking.log
module:
  name: banking
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: true
entities:
  bank:
    collection: banks
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bank_account:
    collection: bank_accounts
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bank_clearance:
    collection: bank_clearances
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bank_reconciliation:
    collection: bank_reconciliations
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bank_statement_import:
    collection: bank_statement_imports
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  bank_transaction:
    collection: bank_transactions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
